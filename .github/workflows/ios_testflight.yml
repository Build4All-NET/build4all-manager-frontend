name: iOS - Build IPA + Upload TestFlight (Manual signing, CI)

on:
  workflow_dispatch:

jobs:
  ios:
    runs-on: macos-14

    env:
      IOS_P12_B64: ${{ secrets.IOS_P12_B64 }}
      IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
      IOS_MOBILEPROVISION_B64: ${{ secrets.IOS_MOBILEPROVISION_B64 }}

      IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
      IOS_EXPORT_METHOD: ${{ secrets.IOS_EXPORT_METHOD }} # app-store
      IOS_CODE_SIGN_IDENTITY: ${{ secrets.IOS_CODE_SIGN_IDENTITY }} # Apple Distribution: ...

      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_P8_B64: ${{ secrets.ASC_KEY_P8_B64 }}

      COCOAPODS_DISABLE_STATS: "true"
      FASTLANE_OPT_OUT_USAGE: "true"
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8

      # ✅ MUST match the App ID in your provisioning profile
      IOS_BUNDLE_ID: com.build4all.build4allmanager

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.0"
          channel: stable
          cache: true

      # ✅ Fix org ambiguity + keep correct reverse domain (NOT full bundle id)
      - name: Recreate iOS folder (force org)
        shell: bash
        run: |
          set -euo pipefail
          rm -rf ios
          flutter clean
          flutter create --platforms=ios --org com.build4all .
          flutter pub get

      - name: Force Bundle ID everywhere
        shell: bash
        run: |
          set -euo pipefail
          PBX="ios/Runner.xcodeproj/project.pbxproj"
          /usr/bin/perl -0777 -i -pe 's/PRODUCT_BUNDLE_IDENTIFIER = [^;]+;/PRODUCT_BUNDLE_IDENTIFIER = '"$IOS_BUNDLE_ID"';/g' "$PBX"
          echo "✅ Bundle ID forced to $IOS_BUNDLE_ID"

      # ✅ Pod + Pods deployment target to 14.0
      - name: Set iOS deployment target to 14.0
        shell: bash
        run: |
          set -euo pipefail

          # Podfile platform
          if grep -q "# platform :ios" ios/Podfile; then
            sed -i '' "s/# platform :ios, '.*'/platform :ios, '14.0'/" ios/Podfile
          elif ! grep -q "platform :ios" ios/Podfile; then
            sed -i '' "1s/^/platform :ios, '14.0'\n/" ios/Podfile
          else
            sed -i '' "s/platform :ios, '.*'/platform :ios, '14.0'/" ios/Podfile
          fi

          # Force all Pods targets deployment target via post_install
          # Keep Pods with Automatic signing but disable actual code signing
          if ! grep -q "post_install do |installer|" ios/Podfile; then
            cat >> ios/Podfile <<'RUBY'

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '14.0'
                
                # Pods should keep automatic signing style but skip actual signing
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                config.build_settings.delete('CODE_SIGN_IDENTITY')
                config.build_settings.delete('PROVISIONING_PROFILE_SPECIFIER')
              end
            end
          end
          RUBY
          fi

          # Runner deployment target
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 14.0;/g' ios/Runner.xcodeproj/project.pbxproj

          echo "✅ iOS deployment target set to 14.0"

      - name: Validate P12
        shell: bash
        run: |
          set -euo pipefail
          echo "$IOS_P12_B64" | tr -d '\n\r ' | base64 --decode > "$RUNNER_TEMP/cert.p12"
          openssl pkcs12 -in "$RUNNER_TEMP/cert.p12" -passin pass:"$IOS_P12_PASSWORD" -info -noout
          echo "✅ P12 OK"

      - name: Install cert + provisioning profile (extract PP_NAME)
        shell: bash
        run: |
          set -euo pipefail

          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PWD="ci_pwd_123"

          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          security default-keychain -s "$KEYCHAIN"

          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$IOS_P12_PASSWORD" -A \
            -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/xcodebuild

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN"

          PP_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP_DIR"

          echo "$IOS_MOBILEPROVISION_B64" | tr -d '\n\r ' | base64 --decode > "$RUNNER_TEMP/profile.mobileprovision"
          test -s "$RUNNER_TEMP/profile.mobileprovision"

          security cms -D -i "$RUNNER_TEMP/profile.mobileprovision" > "$RUNNER_TEMP/profile.plist"
          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$RUNNER_TEMP/profile.plist")
          PP_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$RUNNER_TEMP/profile.plist")
          APP_ID=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" "$RUNNER_TEMP/profile.plist")

          cp "$RUNNER_TEMP/profile.mobileprovision" "$PP_DIR/$PP_UUID.mobileprovision"

          echo "PP_NAME=$PP_NAME" >> "$GITHUB_ENV"
          echo "PP_UUID=$PP_UUID" >> "$GITHUB_ENV"
          echo "APP_ID_IN_PROFILE=$APP_ID" >> "$GITHUB_ENV"

          echo "✅ PP_NAME: $PP_NAME"
          echo "✅ APP_ID_IN_PROFILE: $APP_ID"
          security find-identity -v -p codesigning || true

      - name: Verify profile matches bundle id
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$APP_ID_IN_PROFILE" != *".$IOS_BUNDLE_ID" ]]; then
            echo "❌ Profile app id does not match bundle id"
            echo "Profile:  $APP_ID_IN_PROFILE"
            echo "BundleId:  $IOS_BUNDLE_ID"
            exit 1
          fi
          echo "✅ Profile matches bundle id"

      - name: Install CocoaPods
        shell: bash
        run: |
          set -euo pipefail
          cd ios
          pod repo update
          pod install --repo-update
          cd ..

      # ✅ Ensure Pods project stays with automatic/no signing
      - name: Clean Pods signing configuration
        shell: bash
        run: |
          set -euo pipefail
          PODS_PBX="ios/Pods/Pods.xcodeproj/project.pbxproj"
          
          if [ -f "$PODS_PBX" ]; then
            # Remove any PROVISIONING_PROFILE_SPECIFIER from Pods
            sed -i '' '/PROVISIONING_PROFILE_SPECIFIER/d' "$PODS_PBX"
            
            # Ensure Pods use Automatic style (not Manual)
            sed -i '' 's/ProvisioningStyle = Manual;/ProvisioningStyle = Automatic;/g' "$PODS_PBX"
            sed -i '' 's/CODE_SIGN_STYLE = Manual;/CODE_SIGN_STYLE = Automatic;/g' "$PODS_PBX"
            
            echo "✅ Pods signing cleaned - set to Automatic"
          fi

      # ✅ CRITICAL: Configure manual signing properly
      - name: Configure Runner manual signing in pbxproj
        shell: bash
        run: |
          set -euo pipefail
          PBX="ios/Runner.xcodeproj/project.pbxproj"

          # Replace ALL instances of ProvisioningStyle = Automatic with Manual
          sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' "$PBX"
          
          # Replace ALL instances of CODE_SIGN_STYLE = Automatic with Manual
          /usr/bin/perl -0777 -i -pe 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$PBX"

          # Set DEVELOPMENT_TEAM for all configurations
          /usr/bin/perl -0777 -i -pe 's/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = '"$IOS_TEAM_ID"';/g' "$PBX"
          
          # If DEVELOPMENT_TEAM doesn't exist in buildSettings, add it after CURRENT_PROJECT_VERSION
          /usr/bin/perl -0777 -i -pe 's/(CURRENT_PROJECT_VERSION = [^;]+;)/$1\n\t\t\t\tDEVELOPMENT_TEAM = '"$IOS_TEAM_ID"';/g' "$PBX"

          # Set CODE_SIGN_IDENTITY
          /usr/bin/perl -0777 -i -pe 's/CODE_SIGN_IDENTITY = [^;]*;/CODE_SIGN_IDENTITY = "'"$IOS_CODE_SIGN_IDENTITY"'";/g' "$PBX"
          
          # Set PROVISIONING_PROFILE_SPECIFIER
          /usr/bin/perl -0777 -i -pe 's/PROVISIONING_PROFILE_SPECIFIER = [^;]*;/PROVISIONING_PROFILE_SPECIFIER = "'"$PP_NAME"'";/g' "$PBX"

          echo "✅ Runner signing configured in pbxproj"
          
          # Verify the changes
          echo "Verifying DEVELOPMENT_TEAM is set:"
          grep "DEVELOPMENT_TEAM" "$PBX" | head -5 || echo "⚠️ DEVELOPMENT_TEAM not found"
          
          echo "Verifying CODE_SIGN_STYLE is Manual:"
          grep "CODE_SIGN_STYLE" "$PBX" | head -5 || echo "⚠️ CODE_SIGN_STYLE not found"

      - name: Create ExportOptions.plist
        shell: bash
        run: |
          set -euo pipefail
          cat > ios/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${IOS_EXPORT_METHOD}</string>
            <key>teamID</key>
            <string>${IOS_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${IOS_BUNDLE_ID}</key>
              <string>${PP_NAME}</string>
            </dict>
            <key>signingCertificate</key>
            <string>${IOS_CODE_SIGN_IDENTITY}</string>
            <key>compileBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Build iOS Archive (full logs)
        shell: bash
        run: |
          set -euo pipefail
          cd ios

          LOG="$RUNNER_TEMP/xcodebuild_archive.log"
          : > "$LOG"

          set +e
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/Runner.xcarchive" \
            -destination 'generic/platform=iOS' \
            archive \
            2>&1 | tee -a "$LOG"
          RC=${PIPESTATUS[0]}
          set -e

          echo "xcodebuild exit code: $RC"
          if [ "$RC" -ne 0 ]; then
            echo "❌ LAST 200 lines:"
            tail -n 200 "$LOG" || true
            exit "$RC"
          fi
          echo "✅ Archive created"

      - name: Export IPA
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/ios/ipa

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Runner.xcarchive" \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ios/ExportOptions.plist

          ls -lh build/ios/ipa/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/*.ipa
          if-no-files-found: error

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Install fastlane
        shell: bash
        run: |
          set -euo pipefail
          gem install fastlane -N

      - name: Create ASC api_key.json
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .private
          echo "$ASC_KEY_P8_B64" | tr -d '\n\r ' | base64 --decode > .private/AuthKey.p8

          cat > .private/api_key.json <<EOF
          {
            "key_id": "${ASC_KEY_ID}",
            "issuer_id": "${ASC_ISSUER_ID}",
            "key_filepath": ".private/AuthKey.p8",
            "in_house": false
          }
          EOF

      - name: Upload to TestFlight
        shell: bash
        run: |
          set -euo pipefail

          IPA_PATH="$(ls -1 build/ios/ipa/*.ipa | head -n 1)"
          [ -f "$IPA_PATH" ] || { echo "❌ IPA not found"; exit 1; }

          fastlane pilot upload \
            --ipa "$IPA_PATH" \
            --api_key_path ".private/api_key.json" \
            --app_identifier "$IOS_BUNDLE_ID" \
            --skip_waiting_for_build_processing true
