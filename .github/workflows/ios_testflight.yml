name: iOS - Build & Upload to TestFlight

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "lib/**"
      - "ios/**"
      - "pubspec.yaml"
      - ".github/workflows/ios-testflight.yml"

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_upload:
    runs-on: macos-latest

    env:
      FLUTTER_VERSION: "3.22.3" # change if needed
      BUNDLE_ID: "com.build4all.build4allmanager"
      IOS_EXPORT_METHOD: ${{ secrets.IOS_EXPORT_METHOD }} # for TestFlight => app-store

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods -N
          cd ios
          pod repo update
          pod install

      - name: Decode App Store Connect API key (.p8)
        run: |
          mkdir -p private_keys
          echo "${{ secrets.ASC_KEY_P8_B64 }}" | base64 --decode > private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

          cat > api_key.json <<EOF
          {
            "key_id": "${{ secrets.ASC_KEY_ID }}",
            "issuer_id": "${{ secrets.ASC_ISSUER_ID }}",
            "key_filepath": "private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8"
          }
          EOF

      - name: Setup signing (P12 + MobileProvision)
        shell: bash
        run: |
          set -euo pipefail

          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          # Import P12
          echo "${{ secrets.IOS_P12_B64 }}" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "${{ secrets.IOS_P12_PASSWORD }}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Install provisioning profile
          PP_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP_DIR"

          PP_PATH="$RUNNER_TEMP/profile.mobileprovision"
          echo "${{ secrets.IOS_MOBILEPROVISION_B64 }}" | base64 --decode > "$PP_PATH"

          /usr/bin/security cms -D -i "$PP_PATH" > "$RUNNER_TEMP/profile.plist"
          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$RUNNER_TEMP/profile.plist")
          PP_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$RUNNER_TEMP/profile.plist")

          cp "$PP_PATH" "$PP_DIR/$PP_UUID.mobileprovision"

          echo "PP_UUID=$PP_UUID" >> $GITHUB_ENV
          echo "PP_NAME=$PP_NAME" >> $GITHUB_ENV

      - name: Build iOS archive (xcodebuild)
        shell: bash
        run: |
          set -euo pipefail

          # Generate iOS build (no signing from Flutter)
          flutter build ios --release --no-codesign

          ARCHIVE_PATH="$RUNNER_TEMP/Runner.xcarchive"

          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$ARCHIVE_PATH" \
            DEVELOPMENT_TEAM="${{ secrets.IOS_TEAM_ID }}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="${{ secrets.IOS_CODE_SIGN_IDENTITY }}" \
            PROVISIONING_PROFILE_SPECIFIER="$PP_NAME" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            clean archive

          echo "ARCHIVE_PATH=$ARCHIVE_PATH" >> $GITHUB_ENV

      - name: Export IPA
        shell: bash
        run: |
          set -euo pipefail

          EXPORT_PATH="$RUNNER_TEMP/export"
          mkdir -p "$EXPORT_PATH"

          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${{ secrets.IOS_EXPORT_METHOD }}</string>
            <key>teamID</key>
            <string>${{ secrets.IOS_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${{ env.BUNDLE_ID }}</key>
              <string>$PP_NAME</string>
            </dict>
            <key>compileBitcode</key>
            <false/>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

          IPA_PATH=$(ls -1 "$EXPORT_PATH"/*.ipa | head -n 1)
          echo "IPA_PATH=$IPA_PATH" >> $GITHUB_ENV
          echo "IPA exported at: $IPA_PATH"

      - name: Upload to TestFlight (Fastlane pilot)
        run: |
          sudo gem install fastlane -N
          fastlane pilot upload \
            --ipa "$IPA_PATH" \
            --api_key_path api_key.json \
            --skip_waiting_for_build_processing true

      - name: Upload IPA artifact (optional)
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ${{ env.IPA_PATH }}
