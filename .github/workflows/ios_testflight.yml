name: iOS - Build IPA + Upload TestFlight (NO dart-define)

on:
  workflow_dispatch:

jobs:
  ios:
    runs-on: macos-14

    env:
      IOS_P12_B64: ${{ secrets.IOS_P12_B64 }}
      IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
      IOS_MOBILEPROVISION_B64: ${{ secrets.IOS_MOBILEPROVISION_B64 }}
      IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
      IOS_EXPORT_METHOD: ${{ secrets.IOS_EXPORT_METHOD }} # app-store
      IOS_CODE_SIGN_IDENTITY: ${{ secrets.IOS_CODE_SIGN_IDENTITY }} # Apple Distribution

      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_P8_B64: ${{ secrets.ASC_KEY_P8_B64 }}

      COCOAPODS_DISABLE_STATS: "true"
      FASTLANE_OPT_OUT_USAGE: "true"
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.0"
          channel: stable
          cache: true

      - name: Ensure iOS platform exists (generate ios/)
        run: |
          flutter clean
          flutter create --platforms=ios .
          flutter pub get

      - name: Set minimum iOS deployment target
        run: |
          # Uncomment and set platform in Podfile to iOS 14.0
          if grep -q "# platform :ios" ios/Podfile; then
            sed -i '' "s/# platform :ios, '.*'/platform :ios, '14.0'/" ios/Podfile
          elif ! grep -q "platform :ios" ios/Podfile; then
            sed -i '' "1s/^/platform :ios, '14.0'\n/" ios/Podfile
          else
            sed -i '' "s/platform :ios, '.*'/platform :ios, '14.0'/" ios/Podfile
          fi
          
          # Add post_install hook to set deployment target for all pods
          if ! grep -q "post_install do" ios/Podfile; then
            cat >> ios/Podfile <<'EOF'

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '14.0'
              end
            end
          end
          EOF
                    fi
          
          # Update Xcode project deployment target
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 14.0;/g' ios/Runner.xcodeproj/project.pbxproj
          
          echo "✅ iOS deployment target set to 14.0"

      - name: Check Podfile exists
        run: |
          ls -la ios
          echo "--- Podfile content (first 30 lines) ---"
          cat ios/Podfile | head -30
          test -f ios/Podfile && echo "✅ Podfile found" || (echo "❌ Podfile missing" && exit 1)

      - name: Debug P12 decode
        shell: bash
        run: |
          set -euo pipefail
          echo "$IOS_P12_B64" | tr -d '\n\r ' | base64 --decode > "$RUNNER_TEMP/cert.p12"
          echo "Size:"
          ls -lh "$RUNNER_TEMP/cert.p12"
          echo "File type:"
          file "$RUNNER_TEMP/cert.p12" || true
          echo "Try open with openssl (validates password too):"
          openssl pkcs12 -in "$RUNNER_TEMP/cert.p12" -passin pass:"$IOS_P12_PASSWORD" -info -noout
          echo "✅ P12 valid + password OK"

      - name: Install signing cert + provisioning profile
        shell: bash
        run: |
          set -euo pipefail

          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PWD="ci_pwd_123"

          # Create and configure keychain
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -s "$KEYCHAIN_PATH"

          # Import certificate
          echo "$IOS_P12_B64" | tr -d '\n\r ' | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN_PATH" -P "$IOS_P12_PASSWORD" -A \
            -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/xcodebuild

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

          # Install provisioning profile
          PP_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP_DIR"
          
          # Decode and save provisioning profile to temp location first
          echo "$IOS_MOBILEPROVISION_B64" | tr -d '\n\r ' | base64 --decode > "$RUNNER_TEMP/profile.mobileprovision"
          
          # Verify the provisioning profile file exists and has content
          if [ ! -s "$RUNNER_TEMP/profile.mobileprovision" ]; then
            echo "❌ Provisioning profile is empty or missing"
            exit 1
          fi
          
          # Extract profile info to a temporary plist
          security cms -D -i "$RUNNER_TEMP/profile.mobileprovision" > "$RUNNER_TEMP/profile.plist"
          
          # Extract UUID from the plist
          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$RUNNER_TEMP/profile.plist")
          PP_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$RUNNER_TEMP/profile.plist")
          APP_ID=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" "$RUNNER_TEMP/profile.plist" 2>/dev/null || echo "N/A")
          TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" "$RUNNER_TEMP/profile.plist" 2>/dev/null || echo "N/A")
          
          # Copy to the correct location with UUID as filename
          cp "$RUNNER_TEMP/profile.mobileprovision" "$PP_DIR/$PP_UUID.mobileprovision"
          
          # Store for later use
          echo "$PP_UUID" > "$RUNNER_TEMP/pp_uuid.txt"
          echo "$PP_NAME" > "$RUNNER_TEMP/pp_name.txt"

          echo "✅ Provisioning Profile installed"
          echo "  UUID: $PP_UUID"
          echo "  Name: $PP_NAME"
          echo "  App ID: $APP_ID"
          echo "  Team ID: $TEAM_ID"
          
          echo ""
          echo "=== Installed Provisioning Profiles ==="
          ls -la "$PP_DIR"
          
          echo ""
          echo "=== Available Code Signing Identities ==="
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          
          echo ""
          echo "✅ Setup complete"

      - name: Configure Xcode project for manual signing
        shell: bash
        run: |
          set -euo pipefail
          
          # Read the stored values
          PP_UUID=$(cat "$RUNNER_TEMP/pp_uuid.txt")
          PP_NAME=$(cat "$RUNNER_TEMP/pp_name.txt")
          
          # Get bundle ID from Info.plist
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" ios/Runner/Info.plist)
          
          echo "=== Configuration Values ==="
          echo "Team ID: $IOS_TEAM_ID"
          echo "Profile UUID: $PP_UUID"
          echo "Profile Name: $PP_NAME"
          echo "Code Sign Identity: $IOS_CODE_SIGN_IDENTITY"
          echo "Bundle ID: $BUNDLE_ID"
          
          # Create a Ruby script to properly modify the Xcode project
          cat > /tmp/fix_signing.rb <<'RUBY_SCRIPT'
          require 'xcodeproj'
          
          project_path = ARGV[0]
          team_id = ARGV[1]
          profile_uuid = ARGV[2]
          code_sign_identity = ARGV[3]
          
          puts "Opening project: #{project_path}"
          project = Xcodeproj::Project.open(project_path)
          
          # Find the Runner target
          target = project.targets.find { |t| t.name == 'Runner' }
          
          if target.nil?
            puts "❌ Runner target not found"
            exit 1
          end
          
          puts "Found target: #{target.name}"
          
          # Configure signing for all configurations (Debug, Release, Profile)
          target.build_configurations.each do |config|
            puts "\n=== Configuring #{config.name} ==="
            
            # Remove any automatic provisioning settings
            config.build_settings.delete('PROVISIONING_PROFILE')
            config.build_settings.delete('CODE_SIGN_IDENTITY[sdk=iphoneos*]') if config.build_settings['CODE_SIGN_IDENTITY[sdk=iphoneos*]'] == 'iPhone Developer'
            
            # Set manual signing
            config.build_settings['CODE_SIGN_STYLE'] = 'Manual'
            config.build_settings['DEVELOPMENT_TEAM'] = team_id
            config.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = profile_uuid
            config.build_settings['CODE_SIGN_IDENTITY'] = code_sign_identity
            config.build_settings['CODE_SIGN_IDENTITY[sdk=iphoneos*]'] = code_sign_identity
            
            puts "  CODE_SIGN_STYLE: #{config.build_settings['CODE_SIGN_STYLE']}"
            puts "  DEVELOPMENT_TEAM: #{config.build_settings['DEVELOPMENT_TEAM']}"
            puts "  PROVISIONING_PROFILE_SPECIFIER: #{config.build_settings['PROVISIONING_PROFILE_SPECIFIER']}"
            puts "  CODE_SIGN_IDENTITY: #{config.build_settings['CODE_SIGN_IDENTITY']}"
          end
          
          # Update project-level settings
          project.build_configurations.each do |config|
            config.build_settings['DEVELOPMENT_TEAM'] = team_id
          end
          
          # Update target attributes for manual signing
          project.root_object.attributes['TargetAttributes'] ||= {}
          project.root_object.attributes['TargetAttributes'][target.uuid] ||= {}
          project.root_object.attributes['TargetAttributes'][target.uuid]['ProvisioningStyle'] = 'Manual'
          # Remove DevelopmentTeam from TargetAttributes as it can override our settings
          project.root_object.attributes['TargetAttributes'][target.uuid].delete('DevelopmentTeam')
          project.root_object.attributes['TargetAttributes'][target.uuid]['DevelopmentTeam'] = team_id
          
          puts "\n=== Target Attributes ==="
          puts project.root_object.attributes['TargetAttributes'][target.uuid].inspect
          
          project.save
          
          puts "\n✅ Project configuration saved successfully"
          RUBY_SCRIPT

          # Install xcodeproj gem if not present
          echo "Installing xcodeproj gem..."
          gem list -i xcodeproj || gem install xcodeproj --no-document
          
          # Run the Ruby script
          echo "Running Ruby configuration script..."
          ruby /tmp/fix_signing.rb \
            "ios/Runner.xcodeproj" \
            "$IOS_TEAM_ID" \
            "$PP_UUID" \
            "$IOS_CODE_SIGN_IDENTITY"
          
          echo ""
          echo "✅ Manual code signing configured"
          
          # Verify the changes
          echo ""
          echo "=== Verifying project.pbxproj changes ==="
          grep -A2 "PROVISIONING_PROFILE_SPECIFIER" ios/Runner.xcodeproj/project.pbxproj | head -20 || echo "PROVISIONING_PROFILE_SPECIFIER not found"
          grep -A2 "CODE_SIGN_STYLE" ios/Runner.xcodeproj/project.pbxproj | head -20 || echo "CODE_SIGN_STYLE not found"

      - name: Update ExportOptions.plist
        shell: bash
        run: |
          set -euo pipefail
          
          # Get bundle ID from Info.plist
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" ios/Runner/Info.plist)
          
          # Read stored provisioning profile info
          PP_NAME=$(cat "$RUNNER_TEMP/pp_name.txt")
          
          # Create ExportOptions.plist
          cat > ios/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>${IOS_EXPORT_METHOD}</string>
              <key>teamID</key>
              <string>${IOS_TEAM_ID}</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>${BUNDLE_ID}</key>
                  <string>${PP_NAME}</string>
              </dict>
              <key>signingCertificate</key>
              <string>${IOS_CODE_SIGN_IDENTITY}</string>
              <key>uploadSymbols</key>
              <true/>
              <key>compileBitcode</key>
              <false/>
          </dict>
          </plist>
          EOF
          
          echo "✅ Created ExportOptions.plist"
          echo "Bundle ID: $BUNDLE_ID"
          echo "Provisioning Profile Name: $PP_NAME"
          cat ios/ExportOptions.plist

      - name: Install CocoaPods
        run: |
          cd ios
          pod repo update
          pod install --repo-update
          cd ..

      - name: Build iOS Archive
        shell: bash
        run: |
          set -euo pipefail
          
          # Read provisioning profile UUID
          PP_UUID=$(cat "$RUNNER_TEMP/pp_uuid.txt")
          
          # Build the archive using xcodebuild directly for better control
          cd ios
          
          # Build archive - don't set PROVISIONING_PROFILE_SPECIFIER globally as it affects Pods
          # The provisioning profile is already configured in the project.pbxproj
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/Runner.xcarchive" \
            -destination 'generic/platform=iOS' \
            archive
          
          echo "✅ Archive created"

      - name: Export IPA
        shell: bash
        run: |
          set -euo pipefail
          
          mkdir -p build/ios/ipa
          
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Runner.xcarchive" \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ios/ExportOptions.plist \
            -allowProvisioningUpdates
          
          echo "✅ IPA exported"
          ls -lh build/ios/ipa/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/*.ipa
          if-no-files-found: error

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Install fastlane
        run: gem install fastlane -N

      - name: Create ASC api_key.json
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .private
          echo "$ASC_KEY_P8_B64" | tr -d '\n\r ' | base64 --decode > .private/AuthKey.p8

          cat > .private/api_key.json <<EOF
          {
            "key_id": "${ASC_KEY_ID}",
            "issuer_id": "${ASC_ISSUER_ID}",
            "key_filepath": ".private/AuthKey.p8",
            "in_house": false
          }
          EOF

      - name: Upload to TestFlight
        shell: bash
        run: |
          set -euo pipefail

          IPA_PATH="$(ls -1 build/ios/ipa/*.ipa | head -n 1)"
          [ -f "$IPA_PATH" ] || { echo "❌ IPA not found"; exit 1; }

          TMP_DIR="$(mktemp -d)"
          unzip -q "$IPA_PATH" -d "$TMP_DIR"
          APP_PATH="$(find "$TMP_DIR/Payload" -maxdepth 1 -type d -name "*.app" | head -n 1)"
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP_PATH/Info.plist")

          echo "✅ Uploading: $BUNDLE_ID"
          fastlane pilot upload \
            --ipa "$IPA_PATH" \
            --api_key_path ".private/api_key.json" \
            --app_identifier "$BUNDLE_ID" \
            --skip_waiting_for_build_processing true

          echo "✅ Uploaded. Check App Store Connect → TestFlight."
