name: iOS - Build IPA + Upload TestFlight (Manual signing, CI)

on:
  workflow_dispatch:

jobs:
  ios:
    runs-on: macos-14

    env:
      IOS_P12_B64: ${{ secrets.IOS_P12_B64 }}
      IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
      IOS_MOBILEPROVISION_B64: ${{ secrets.IOS_MOBILEPROVISION_B64 }}
      IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
      IOS_EXPORT_METHOD: ${{ secrets.IOS_EXPORT_METHOD }} # app-store
      IOS_CODE_SIGN_IDENTITY: ${{ secrets.IOS_CODE_SIGN_IDENTITY }} # Apple Distribution: ...

      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_P8_B64: ${{ secrets.ASC_KEY_P8_B64 }}

      COCOAPODS_DISABLE_STATS: "true"
      FASTLANE_OPT_OUT_USAGE: "true"
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8

      # ✅ MUST match Apple Developer App ID bundle id
      IOS_BUNDLE_ID: com.build4all.build4allmanager

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.0"
          channel: stable
          cache: true

      - name: Ensure iOS platform exists (generate ios/)
        shell: bash
        run: |
          set -euo pipefail
          flutter clean
          flutter create --platforms=ios .
          flutter pub get

      - name: Force correct Bundle ID (Runner)
        shell: bash
        run: |
          set -euo pipefail
          PBXPROJ="ios/Runner.xcodeproj/project.pbxproj"

          # Replace any existing PRODUCT_BUNDLE_IDENTIFIER with the desired one
          perl -0777 -i -pe 's/PRODUCT_BUNDLE_IDENTIFIER = [^;]+;/PRODUCT_BUNDLE_IDENTIFIER = '"$IOS_BUNDLE_ID"';/g' "$PBXPROJ"

          echo "✅ Bundle ID forced to: $IOS_BUNDLE_ID"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" ios/Runner/Info.plist || true

      - name: Set minimum iOS deployment target (14.0)
        shell: bash
        run: |
          set -euo pipefail
          # Podfile platform
          if grep -q "# platform :ios" ios/Podfile; then
            sed -i '' "s/# platform :ios, '.*'/platform :ios, '14.0'/" ios/Podfile
          elif ! grep -q "platform :ios" ios/Podfile; then
            sed -i '' "1s/^/platform :ios, '14.0'\n/" ios/Podfile
          else
            sed -i '' "s/platform :ios, '.*'/platform :ios, '14.0'/" ios/Podfile
          fi

          # Runner deployment target
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 14.0;/g' ios/Runner.xcodeproj/project.pbxproj
          echo "✅ iOS deployment target set to 14.0"

      - name: Debug P12 decode (validates password)
        shell: bash
        run: |
          set -euo pipefail
          echo "$IOS_P12_B64" | tr -d '\n\r ' | base64 --decode > "$RUNNER_TEMP/cert.p12"
          ls -lh "$RUNNER_TEMP/cert.p12"
          file "$RUNNER_TEMP/cert.p12" || true
          openssl pkcs12 -in "$RUNNER_TEMP/cert.p12" -passin pass:"$IOS_P12_PASSWORD" -info -noout
          echo "✅ P12 valid + password OK"

      - name: Install signing cert + provisioning profile (extract UUID/Name)
        shell: bash
        run: |
          set -euo pipefail

          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PWD="ci_pwd_123"

          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -s "$KEYCHAIN_PATH"

          echo "$IOS_P12_B64" | tr -d '\n\r ' | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN_PATH" -P "$IOS_P12_PASSWORD" -A \
            -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/xcodebuild

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

          PP_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP_DIR"

          echo "$IOS_MOBILEPROVISION_B64" | tr -d '\n\r ' | base64 --decode > "$RUNNER_TEMP/profile.mobileprovision"
          test -s "$RUNNER_TEMP/profile.mobileprovision"

          security cms -D -i "$RUNNER_TEMP/profile.mobileprovision" > "$RUNNER_TEMP/profile.plist"
          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$RUNNER_TEMP/profile.plist")
          PP_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$RUNNER_TEMP/profile.plist")
          APP_ID=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" "$RUNNER_TEMP/profile.plist")

          cp "$RUNNER_TEMP/profile.mobileprovision" "$PP_DIR/$PP_UUID.mobileprovision"

          echo "PP_UUID=$PP_UUID" >> "$GITHUB_ENV"
          echo "PP_NAME=$PP_NAME" >> "$GITHUB_ENV"
          echo "APP_ID_IN_PROFILE=$APP_ID" >> "$GITHUB_ENV"

          echo "✅ Provisioning Profile UUID: $PP_UUID"
          echo "✅ Provisioning Profile Name: $PP_NAME"
          echo "✅ Profile application-identifier: $APP_ID"
          security find-identity -v -p codesigning || true

      - name: Verify profile matches Bundle ID
        shell: bash
        run: |
          set -euo pipefail
          echo "Expected bundle id: $IOS_BUNDLE_ID"
          echo "Profile app id:      $APP_ID_IN_PROFILE"
          # profile app id format: TEAMID.bundleid
          if [[ "$APP_ID_IN_PROFILE" != *".$IOS_BUNDLE_ID" ]]; then
            echo "❌ Provisioning profile does NOT match bundle id."
            echo "   Profile:  $APP_ID_IN_PROFILE"
            echo "   Expected: *.$IOS_BUNDLE_ID"
            exit 1
          fi
          echo "✅ Bundle ID matches provisioning profile"

      - name: Install CocoaPods
        shell: bash
        run: |
          set -euo pipefail
          cd ios
          pod repo update
          pod install --repo-update
          cd ..

      - name: Disable code signing for Pods targets
        shell: bash
        run: |
          set -euo pipefail
          PODS_PBX="ios/Pods/Pods.xcodeproj/project.pbxproj"

          perl -0777 -i -pe 's/CODE_SIGNING_ALLOWED = YES;/CODE_SIGNING_ALLOWED = NO;/g' "$PODS_PBX" || true
          perl -0777 -i -pe 's/CODE_SIGNING_REQUIRED = YES;/CODE_SIGNING_REQUIRED = NO;/g' "$PODS_PBX" || true
          perl -0777 -i -pe 's/PROVISIONING_PROFILE_SPECIFIER = .*?;/PROVISIONING_PROFILE_SPECIFIER = "";/g' "$PODS_PBX" || true
          perl -0777 -i -pe 's/PROVISIONING_PROFILE = .*?;/PROVISIONING_PROFILE = "";/g' "$PODS_PBX" || true
          perl -0777 -i -pe 's/DEVELOPMENT_TEAM = .*?;/DEVELOPMENT_TEAM = "";/g' "$PODS_PBX" || true

          echo "✅ Pods signing disabled"

      - name: Create ExportOptions.plist (manual signing)
        shell: bash
        run: |
          set -euo pipefail
          cat > ios/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${IOS_EXPORT_METHOD}</string>
            <key>teamID</key>
            <string>${IOS_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${IOS_BUNDLE_ID}</key>
              <string>${PP_NAME}</string>
            </dict>
            <key>signingCertificate</key>
            <string>${IOS_CODE_SIGN_IDENTITY}</string>
            <key>compileBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          echo "✅ ExportOptions.plist created"
          cat ios/ExportOptions.plist

      - name: Build iOS Archive (sign Runner only)
        shell: bash
        run: |
          set -euo pipefail
          cd ios

          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/Runner.xcarchive" \
            -destination 'generic/platform=iOS' \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$IOS_TEAM_ID" \
            CODE_SIGN_IDENTITY="$IOS_CODE_SIGN_IDENTITY" \
            PROVISIONING_PROFILE_SPECIFIER="$PP_NAME"

          echo "✅ Archive created"

      - name: Export IPA
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/ios/ipa

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Runner.xcarchive" \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ios/ExportOptions.plist

          echo "✅ IPA exported"
          ls -lh build/ios/ipa/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/*.ipa
          if-no-files-found: error

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Install fastlane
        shell: bash
        run: |
          set -euo pipefail
          gem install fastlane -N

      - name: Create ASC api_key.json
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .private
          echo "$ASC_KEY_P8_B64" | tr -d '\n\r ' | base64 --decode > .private/AuthKey.p8

          cat > .private/api_key.json <<EOF
          {
            "key_id": "${ASC_KEY_ID}",
            "issuer_id": "${ASC_ISSUER_ID}",
            "key_filepath": ".private/AuthKey.p8",
            "in_house": false
          }
          EOF

      - name: Upload to TestFlight
        shell: bash
        run: |
          set -euo pipefail

          IPA_PATH="$(ls -1 build/ios/ipa/*.ipa | head -n 1)"
          [ -f "$IPA_PATH" ] || { echo "❌ IPA not found"; exit 1; }

          echo "✅ Uploading to TestFlight: $IOS_BUNDLE_ID"
          fastlane pilot upload \
            --ipa "$IPA_PATH" \
            --api_key_path ".private/api_key.json" \
            --app_identifier "$IOS_BUNDLE_ID" \
            --skip_waiting_for_build_processing true

          echo "✅ Uploaded. Check App Store Connect → TestFlight."
