name: Build4All Manager (iOS) - Upload to TestFlight

on:
  workflow_dispatch:
    inputs:
      distribute_external:
        description: "Distribute to External TestFlight (requires beta review)"
        required: true
        default: "false"
      changelog:
        description: "Changelog / What to Test"
        required: false
        default: "CI build"
  push:
    branches: [ "main" ]
    paths:
      - "lib/**"
      - "ios/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - ".github/workflows/ios-testflight-build4allmanager.yml"

permissions:
  contents: write

jobs:
  build-ios:
    runs-on: macos-15

    env:
      BUNDLE_ID: "com.build4all.build4allmanager"

      IOS_P12_B64: ${{ secrets.IOS_P12_B64 }}
      IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
      IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
      IOS_EXPORT_METHOD: ${{ secrets.IOS_EXPORT_METHOD }} # app-store

      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_P8_B64: ${{ secrets.ASC_KEY_P8_B64 }}

      DEFAULT_BETA_APP_DESCRIPTION: ${{ secrets.DEFAULT_BETA_APP_DESCRIPTION }}
      DEFAULT_BETA_FEEDBACK_EMAIL: ${{ secrets.DEFAULT_BETA_FEEDBACK_EMAIL }}
      DEFAULT_BETA_CONTACT_PHONE: ${{ secrets.DEFAULT_BETA_CONTACT_PHONE }}

      SPACESHIP_CONNECT_API_IN_HOUSE: "false"
      COCOAPODS_DISABLE_STATS: "true"
      FASTLANE_OPT_OUT_USAGE: "true"
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select newest installed Xcode (safe)
        shell: bash
        run: |
          set -euo pipefail
          echo "🔎 Installed Xcodes:"
          ls -1 /Applications | grep -E '^Xcode.*\.app$' || true
          XCODE_APP="$(ls -1 /Applications | grep -E '^Xcode.*\.app$' | sort -V | tail -n 1)"
          [ -n "${XCODE_APP:-}" ] || { echo "❌ No Xcode found"; exit 1; }
          echo "✅ Selected: $XCODE_APP"
          sudo xcode-select -s "/Applications/$XCODE_APP/Contents/Developer"
          xcodebuild -version

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.0"
          channel: stable
          cache: true

      - name: Flutter pub get
        shell: bash
        run: |
          set -euo pipefail
          flutter --version
          flutter pub get

      - name: Setup iOS signing certificate (P12 -> keychain)
        shell: bash
        run: |
          set -euo pipefail
          [ -n "${IOS_P12_B64:-}" ] || { echo "❌ Missing IOS_P12_B64"; exit 1; }
          [ -n "${IOS_P12_PASSWORD:-}" ] || { echo "❌ Missing IOS_P12_PASSWORD"; exit 1; }

          KEYCHAIN_PATH="${GITHUB_WORKSPACE}/build.keychain"
          KEYCHAIN_PWD="ci_keychain_pwd_123"

          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -s "$KEYCHAIN_PATH"

          echo "$IOS_P12_B64" | tr -d '\n\r ' | base64 --decode > ios_cert.p12
          security import ios_cert.p12 -k "$KEYCHAIN_PATH" -P "$IOS_P12_PASSWORD" -A \
            -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/xcodebuild

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

          CNT=$(security find-identity -v -p codesigning | grep -c "Apple Distribution" || true)
          [ "$CNT" -ge 1 ] || { echo "❌ Apple Distribution identity not found"; exit 1; }

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Create CI wrappers (fastlane/pod/ruby)
        shell: bash
        run: |
          set -euo pipefail

          cat > ci_fastlane <<'BASH'
          #!/usr/bin/env bash
          set -euo pipefail
          if [ -f Gemfile ]; then
            bundle exec fastlane "$@"
          else
            fastlane "$@"
          fi
          BASH
          chmod +x ci_fastlane

          cat > ci_pod <<'BASH'
          #!/usr/bin/env bash
          set -euo pipefail
          if [ -f Gemfile ]; then
            bundle exec pod "$@"
          else
            pod "$@"
          fi
          BASH
          chmod +x ci_pod

          cat > ci_ruby <<'BASH'
          #!/usr/bin/env bash
          set -euo pipefail
          if [ -f Gemfile ]; then
            bundle exec ruby "$@"
          else
            ruby "$@"
          fi
          BASH
          chmod +x ci_ruby

      - name: Force iOS minimum deployment target (Podfile)
        shell: bash
        run: |
          set -euo pipefail
          PODFILE="ios/Podfile"

          if ! grep -q "^platform :ios" "$PODFILE"; then
            sed -i '' '1s;^;platform :ios, '\''14.0'\''\n\n;' "$PODFILE"
          else
            sed -i '' "s/platform :ios, '[0-9.]\\+'/platform :ios, '14.0'/" "$PODFILE"
          fi

          # Pin GTMAppAuth directly to its git tag to avoid CocoaPods CDN clone failures (GitHub 500s)
          if grep -q "GTMAppAuth" "$PODFILE"; then
            sed -i '' "s|pod 'GTMAppAuth'.*|pod 'GTMAppAuth', :git => 'https://github.com/google/GTMAppAuth.git', :tag => '4.1.1'|" "$PODFILE"
          else
            # Inject before the closing `end` of the target block
            sed -i '' "/^end$/i\\
          pod 'GTMAppAuth', :git => 'https://github.com/google/GTMAppAuth.git', :tag => '4.1.1'
          " "$PODFILE"
          fi

          echo "✅ Podfile iOS platform forced to 14.0 + GTMAppAuth pinned to git tag"
          head -n 10 "$PODFILE"

      - name: Install Ruby tooling (Bundler if available, else fallback gem install)
        shell: bash
        run: |
          set -euo pipefail

          if [ -f Gemfile ]; then
            echo "✅ Gemfile found → using Bundler (recommended)"
            gem install bundler -N || true
            bundle --version
            bundle config set path vendor/bundle
            bundle install --jobs 4 --retry 3
            ./ci_pod --version
            ./ci_fastlane --version
          else
            echo "⚠️ No Gemfile → fallback to gem install (with --force to avoid console conflicts)"
            gem install cocoapods -N
            gem install fastlane -N --force
            gem install xcodeproj -N || true
            pod --version
            fastlane --version
          fi

      - name: Create App Store Connect api_key.json (inline key for fastlane)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .private

          [ -n "${ASC_KEY_ID:-}" ] || { echo "❌ ASC_KEY_ID empty"; exit 1; }
          [ -n "${ASC_ISSUER_ID:-}" ] || { echo "❌ ASC_ISSUER_ID empty"; exit 1; }
          [ -n "${ASC_KEY_P8_B64:-}" ] || { echo "❌ ASC_KEY_P8_B64 empty"; exit 1; }

          python3 - <<'PY'
          import os, re, base64, pathlib, json, binascii

          key_id = os.environ["ASC_KEY_ID"].strip()
          issuer_id = os.environ["ASC_ISSUER_ID"].strip()
          raw = os.environ["ASC_KEY_P8_B64"]

          p8_path = pathlib.Path(".private") / f"AuthKey_{key_id}.p8"
          p8_path.parent.mkdir(parents=True, exist_ok=True)

          s = re.sub(r"\s+", "", raw).strip().strip('"').strip("'")

          if "BEGIN" in raw and "PRIVATE" in raw:
              p8_path.write_text(raw.strip(), encoding="utf-8")
          else:
              s += "=" * ((-len(s)) % 4)
              try:
                  p8_path.write_bytes(base64.b64decode(s))
              except binascii.Error as e:
                  raise SystemExit(f"❌ ASC_KEY_P8_B64 invalid base64: {e}")

          key_content = p8_path.read_text(encoding="utf-8")
          api_key_data = {
              "key_id": key_id,
              "issuer_id": issuer_id,
              "key": key_content,
              "in_house": False
          }
          pathlib.Path(".private/api_key.json").write_text(
              json.dumps(api_key_data, indent=2),
              encoding="utf-8"
          )
          print("✅ api_key.json created with inline key")
          PY

      - name: Export API key path for Fastlane
        run: echo "APP_STORE_CONNECT_API_KEY_PATH=$GITHUB_WORKSPACE/.private/api_key.json" >> $GITHUB_ENV

      - name: Get provisioning profile
        shell: bash
        run: |
          set -euo pipefail
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"

          ./ci_fastlane run sigh \
            app_identifier:"$BUNDLE_ID" \
            team_id:"${IOS_TEAM_ID}" \
            api_key_path:"$GITHUB_WORKSPACE/.private/api_key.json" \
            provisioning_name:"B4A_${BUNDLE_ID}_APPSTORE" \
            readonly:false \
            output_path:"$PROFILE_DIR"

          sleep 2

      - name: Detect provisioning profile name
        shell: bash
        run: |
          set -euo pipefail
          APP_ID="${IOS_TEAM_ID}.${BUNDLE_ID}"
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"

          FOUND_NAME=""
          for f in "$PROFILES_DIR"/*.mobileprovision; do
            [ -f "$f" ] || continue
            TMP_PLIST="$(mktemp /tmp/profile.XXXXXX.plist)"
            /usr/bin/security cms -D -i "$f" > "$TMP_PLIST" 2>/dev/null || { rm -f "$TMP_PLIST"; continue; }

            P_NAME=$("/usr/libexec/PlistBuddy" -c "Print :Name" "$TMP_PLIST" 2>/dev/null || echo "")
            P_APPID=$("/usr/libexec/PlistBuddy" -c "Print :Entitlements:application-identifier" "$TMP_PLIST" 2>/dev/null || echo "")

            if [ "$P_APPID" = "$APP_ID" ] || echo "$P_APPID" | grep -q "$BUNDLE_ID"; then
              FOUND_NAME="$P_NAME"
              echo "$FOUND_NAME" > ci_profile_name.txt
              rm -f "$TMP_PLIST"
              break
            fi
            rm -f "$TMP_PLIST"
          done

          [ -n "$FOUND_NAME" ] || { echo "❌ No provisioning profile matched"; exit 1; }
          echo "✅ Profile: $FOUND_NAME"

      - name: Create ExportOptions.plist
        shell: bash
        run: |
          set -euo pipefail
          METHOD="${IOS_EXPORT_METHOD:-app-store}"
          PROFILE_NAME="$(tr -d '\r\n' < ci_profile_name.txt)"

          cat > ios/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${METHOD}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${IOS_TEAM_ID}</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>destination</key>
            <string>export</string>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

          /usr/bin/plutil -lint ios/ExportOptions.plist

      - name: Patch Runner signing (Release)
        shell: bash
        run: |
          set -euo pipefail
          PROFILE_NAME="$(tr -d '\r\n' < ci_profile_name.txt)"

          cat > patch_runner_signing.rb <<'RUBY'
          require "xcodeproj"

          bundle_id = ENV.fetch("BUNDLE_ID")
          profile   = ENV.fetch("PROFILE_NAME")
          team_id   = ENV.fetch("TEAM_ID")

          project = Xcodeproj::Project.open("ios/Runner.xcodeproj")
          runner = project.targets.find { |t| t.name == "Runner" }
          raise "Runner target not found" unless runner

          runner.build_configurations.each do |cfg|
            next unless cfg.name == "Release"
            s = cfg.build_settings
            s["PRODUCT_BUNDLE_IDENTIFIER"] = bundle_id
            s["CODE_SIGN_STYLE"] = "Manual"
            s["DEVELOPMENT_TEAM"] = team_id
            s["CODE_SIGN_IDENTITY"] = "Apple Distribution"
            s["PROVISIONING_PROFILE_SPECIFIER"] = profile
            s["CODE_SIGNING_ALLOWED"] = "YES"
            s["CODE_SIGNING_REQUIRED"] = "YES"
          end

          project.save
          RUBY

          BUNDLE_ID="${BUNDLE_ID}" PROFILE_NAME="${PROFILE_NAME}" TEAM_ID="${IOS_TEAM_ID}" ./ci_ruby patch_runner_signing.rb

      # ── CocoaPods cache ──────────────────────────────────────────────────────
      # Caching Pods + ~/.cocoapods avoids re-cloning on every run.
      # Cache key is based on Podfile.lock so it invalidates when deps change.
      - name: Cache CocoaPods sources & install
        uses: actions/cache@v4
        id: pods-cache
        with:
          path: |
            ios/Pods
            ~/.cocoapods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install iOS Pods (with retry on GitHub 500s)
        shell: bash
        run: |
          set -euo pipefail
          cd ios

          MAX_ATTEMPTS=3
          ATTEMPT=0

          until ../ci_pod install; do
            ATTEMPT=$((ATTEMPT + 1))
            if [ "$ATTEMPT" -ge "$MAX_ATTEMPTS" ]; then
              echo "❌ pod install failed after $MAX_ATTEMPTS attempts"
              exit 1
            fi
            echo "⚠️  pod install failed (attempt $ATTEMPT/$MAX_ATTEMPTS) — updating spec repo and retrying in 30s..."
            sleep 30
            ../ci_pod repo update
          done

          echo "✅ pod install succeeded"

      - name: Force iOS deployment target for all Pods
        shell: bash
        run: |
          set -euo pipefail
          PODS_PROJECT="ios/Pods/Pods.xcodeproj/project.pbxproj"
          echo "🔧 Forcing IPHONEOS_DEPLOYMENT_TARGET = 14.0 for Pods"
          perl -pi -e 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]+;/IPHONEOS_DEPLOYMENT_TARGET = 14.0;/g' "$PODS_PROJECT"

      - name: Add required privacy purpose strings (Info.plist)
        shell: bash
        run: |
          set -euo pipefail
          INFO_PLIST="ios/Runner/Info.plist"

          echo "🔧 Updating privacy keys in $INFO_PLIST"

          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'This app needs access to your photo library to let you choose and upload images.'" "$INFO_PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryUsageDescription 'This app needs access to your photo library to let you choose and upload images.'" "$INFO_PLIST"

          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'This app needs access to your camera to let you take and upload photos.'" "$INFO_PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :NSCameraUsageDescription 'This app needs access to your camera to let you take and upload photos.'" "$INFO_PLIST"

          /usr/libexec/PlistBuddy -c "Add :NSLocationWhenInUseUsageDescription string 'This app may use your location to show relevant content such as nearby services or map features.'" "$INFO_PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :NSLocationWhenInUseUsageDescription 'This app may use your location to show relevant content such as nearby services or map features.'" "$INFO_PLIST"

          /usr/libexec/PlistBuddy -c "Add :NSLocationAlwaysAndWhenInUseUsageDescription string 'This app may use your location to support features that rely on maps and location-based results.'" "$INFO_PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :NSLocationAlwaysAndWhenInUseUsageDescription 'This app may use your location to support features that rely on maps and location-based results.'" "$INFO_PLIST"

          echo "✅ Verifying:"
          /usr/libexec/PlistBuddy -c "Print :NSPhotoLibraryUsageDescription" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Print :NSCameraUsageDescription" "$INFO_PLIST"

      - name: Compute build name/number
        shell: bash
        run: |
          set -euo pipefail
          BUILD_NAME="$(python3 - <<'PY'
          import re
          t=open("pubspec.yaml","r",encoding="utf-8").read()
          m=re.search(r"^version:\s*([0-9]+(?:\.[0-9]+){1,3})", t, re.M)
          print(m.group(1) if m else "1.0.0")
          PY
          )"
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"

          echo "BUILD_NAME=$BUILD_NAME" >> $GITHUB_ENV
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
          echo "✅ Using BUILD_NAME=$BUILD_NAME BUILD_NUMBER=$BUILD_NUMBER"

      - name: Build iOS (flutter)
        shell: bash
        run: |
          set -euo pipefail
          flutter build ios --release --no-codesign \
            --build-name "$BUILD_NAME" \
            --build-number "$BUILD_NUMBER"

      - name: Force Pods = no signing
        shell: bash
        run: |
          set -euo pipefail
          PODS_PBX="ios/Pods/Pods.xcodeproj/project.pbxproj"
          perl -pi -e 's/(PROVISIONING_PROFILE_SPECIFIER(\[sdk=iphoneos\*\])?) = [^;]*;/\1 = "";/g' "$PODS_PBX"
          perl -pi -e 's/PROVISIONING_PROFILE = [^;]*;/PROVISIONING_PROFILE = "";/g' "$PODS_PBX"
          perl -pi -e 's/DEVELOPMENT_TEAM = [A-Z0-9]+;/DEVELOPMENT_TEAM = "";/g' "$PODS_PBX"
          perl -pi -e 's/(CODE_SIGN_IDENTITY(\[sdk=iphoneos\*\])?) = [^;]*;/\1 = "";/g' "$PODS_PBX"
          perl -pi -e 's/CODE_SIGN_STYLE = Manual;/CODE_SIGN_STYLE = Automatic;/g' "$PODS_PBX"
          perl -pi -e 's/CODE_SIGNING_ALLOWED = YES;/CODE_SIGNING_ALLOWED = NO;/g' "$PODS_PBX"
          perl -pi -e 's/CODE_SIGNING_REQUIRED = YES;/CODE_SIGNING_REQUIRED = NO;/g' "$PODS_PBX"

      - name: Archive
        shell: bash
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="${GITHUB_WORKSPACE}/build.keychain"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "ci_keychain_pwd_123" "$KEYCHAIN_PATH" || true

          mkdir -p build/ios/archive
          cd ios

          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath ../build/ios/archive/Runner.xcarchive \
            OTHER_CODE_SIGN_FLAGS="--keychain ${KEYCHAIN_PATH}" \
            archive

      - name: Export IPA
        shell: bash
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="${GITHUB_WORKSPACE}/build.keychain"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "ci_keychain_pwd_123" "$KEYCHAIN_PATH" || true

          mkdir -p build/ios/ipa
          cd ios

          xcodebuild -exportArchive \
            -archivePath ../build/ios/archive/Runner.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath ../build/ios/ipa \
            OTHER_CODE_SIGN_FLAGS="--keychain ${KEYCHAIN_PATH}"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/**/*.ipa
          if-no-files-found: error

      - name: Upload to TestFlight
        shell: bash
        run: |
          set -euo pipefail
          API_KEY_JSON="$GITHUB_WORKSPACE/.private/api_key.json"
          IPA_PATH="$(find "$GITHUB_WORKSPACE/build/ios/ipa" -type f -name "*.ipa" | head -n 1)"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DIST_EXT="${{ github.event.inputs.distribute_external }}"
            CHANGELOG="${{ github.event.inputs.changelog }}"
          else
            DIST_EXT="false"
            CHANGELOG="CI build (push)"
          fi

          [ -n "$CHANGELOG" ] || CHANGELOG="CI build"

          if [ "$DIST_EXT" = "true" ]; then
            echo "📤 Uploading to TestFlight (External)..."
            ./ci_fastlane pilot upload \
              --ipa "$IPA_PATH" \
              --api_key_path "$API_KEY_JSON" \
              --app_identifier "${BUNDLE_ID}" \
              --skip_waiting_for_build_processing false \
              --distribute_external true \
              --skip_submission false \
              --changelog "$CHANGELOG"
          else
            echo "📤 Uploading to TestFlight (Internal)..."
            ./ci_fastlane pilot upload \
              --ipa "$IPA_PATH" \
              --api_key_path "$API_KEY_JSON" \
              --app_identifier "${BUNDLE_ID}" \
              --skip_waiting_for_build_processing true \
              --changelog "$CHANGELOG"
          fi
