name: iOS - Build IPA + Upload TestFlight (Manual signing, CI - FIXED)

on:
  workflow_dispatch:

jobs:
  ios:
    runs-on: macos-14

    env:
      IOS_P12_B64: ${{ secrets.IOS_P12_B64 }}
      IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
      IOS_MOBILEPROVISION_B64: ${{ secrets.IOS_MOBILEPROVISION_B64 }}
      IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
      IOS_EXPORT_METHOD: ${{ secrets.IOS_EXPORT_METHOD }} # app-store
      IOS_CODE_SIGN_IDENTITY: ${{ secrets.IOS_CODE_SIGN_IDENTITY }} # Apple Distribution: ...

      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_P8_B64: ${{ secrets.ASC_KEY_P8_B64 }}

      COCOAPODS_DISABLE_STATS: "true"
      FASTLANE_OPT_OUT_USAGE: "true"
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8

      # ✅ Must match your Apple App ID
      IOS_BUNDLE_ID: com.build4all.build4allmanager

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.0"
          channel: stable
          cache: true

      - name: Pub get
        shell: bash
        run: |
          set -euo pipefail
          flutter pub get

      - name: Ensure iOS folder exists (ONLY if missing)
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -d "ios" ]; then
            echo "ios/ missing → creating iOS platform"
            flutter create --platforms=ios --org com.build4all .
          else
            echo "ios/ exists → skipping flutter create"
          fi

      - name: Force Bundle ID in Xcode project (Runner)
        shell: bash
        run: |
          set -euo pipefail
          PBXPROJ="ios/Runner.xcodeproj/project.pbxproj"

          # Force PRODUCT_BUNDLE_IDENTIFIER everywhere
          /usr/bin/perl -0777 -i -pe 's/PRODUCT_BUNDLE_IDENTIFIER = [^;]+;/PRODUCT_BUNDLE_IDENTIFIER = '"$IOS_BUNDLE_ID"';/g' "$PBXPROJ"

          echo "✅ Bundle ID forced to: $IOS_BUNDLE_ID"

      - name: Update Podfile (iOS 14 + Disable signing for Pods)
        shell: bash
        run: |
          set -euo pipefail

          # Ensure platform iOS 14.0 is set
          if grep -q "# platform :ios" ios/Podfile; then
            sed -i '' "s/# platform :ios, '.*'/platform :ios, '14.0'/" ios/Podfile
          elif ! grep -q "platform :ios" ios/Podfile; then
            sed -i '' "1s/^/platform :ios, '14.0'\n/" ios/Podfile
          else
            sed -i '' "s/platform :ios, '.*'/platform :ios, '14.0'/" ios/Podfile
          fi

          # Add a post_install block (or replace if already exists) to:
          # - force all Pods deployment target to 14.0
          # - disable code signing for all Pods
          if grep -q "post_install do |installer|" ios/Podfile; then
            echo "Podfile already has post_install, leaving it as-is (make sure it disables Pods signing)."
          else
            cat >> ios/Podfile <<'RUBY'

          post_install do |installer|
            installer.pods_project.targets.each do |t|
              t.build_configurations.each do |config|
                # Fix old pods deployment target warnings
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '14.0'
          
                # Pods must NOT sign
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                config.build_settings['CODE_SIGN_IDENTITY'] = ''
                config.build_settings['EXPANDED_CODE_SIGN_IDENTITY'] = ''
                config.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = ''
                config.build_settings['PROVISIONING_PROFILE'] = ''
                config.build_settings['DEVELOPMENT_TEAM'] = ''
              end
            end
          end
          RUBY
          fi

          echo "✅ Podfile prepared"

      - name: Install CocoaPods
        shell: bash
        run: |
          set -euo pipefail
          cd ios
          pod repo update
          pod install --repo-update
          cd ..

      - name: Install signing cert + provisioning profile (extract profile name)
        shell: bash
        run: |
          set -euo pipefail

          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PWD="ci_pwd_123"

          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -s "$KEYCHAIN_PATH"

          # Import cert
          echo "$IOS_P12_B64" | tr -d '\n\r ' | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN_PATH" -P "$IOS_P12_PASSWORD" -A \
            -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

          # Install provisioning profile
          PP_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP_DIR"

          echo "$IOS_MOBILEPROVISION_B64" | tr -d '\n\r ' | base64 --decode > "$RUNNER_TEMP/profile.mobileprovision"
          test -s "$RUNNER_TEMP/profile.mobileprovision"

          security cms -D -i "$RUNNER_TEMP/profile.mobileprovision" > "$RUNNER_TEMP/profile.plist"
          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$RUNNER_TEMP/profile.plist")
          PP_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$RUNNER_TEMP/profile.plist")
          APP_ID=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" "$RUNNER_TEMP/profile.plist")

          cp "$RUNNER_TEMP/profile.mobileprovision" "$PP_DIR/$PP_UUID.mobileprovision"

          echo "PP_UUID=$PP_UUID" >> "$GITHUB_ENV"
          echo "PP_NAME=$PP_NAME" >> "$GITHUB_ENV"
          echo "APP_ID_IN_PROFILE=$APP_ID" >> "$GITHUB_ENV"

          echo "✅ Profile UUID: $PP_UUID"
          echo "✅ Profile Name: $PP_NAME"
          echo "✅ Profile AppID: $APP_ID"
          security find-identity -v -p codesigning || true

      - name: Verify profile matches bundle id
        shell: bash
        run: |
          set -euo pipefail
          echo "Expected: *.$IOS_BUNDLE_ID"
          echo "Profile:   $APP_ID_IN_PROFILE"
          if [[ "$APP_ID_IN_PROFILE" != *".$IOS_BUNDLE_ID" ]]; then
            echo "❌ Provisioning profile does NOT match bundle id!"
            exit 1
          fi
          echo "✅ Bundle matches profile"

      - name: Configure Runner manual signing in project (NO global xcodebuild args)
        shell: bash
        run: |
          set -euo pipefail
          PBXPROJ="ios/Runner.xcodeproj/project.pbxproj"

          # Set manual signing style (Runner project attribute)
          sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' "$PBXPROJ" || true

          # Set signing settings in build configs
          /usr/bin/perl -0777 -i -pe 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$PBXPROJ"
          /usr/bin/perl -0777 -i -pe 's/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = '"$IOS_TEAM_ID"';/g' "$PBXPROJ"
          /usr/bin/perl -0777 -i -pe 's/PROVISIONING_PROFILE_SPECIFIER = [^;]*;/PROVISIONING_PROFILE_SPECIFIER = '"$PP_NAME"';/g' "$PBXPROJ"

          # Make sure Release has distribution identity
          /usr/bin/perl -0777 -i -pe 's/CODE_SIGN_IDENTITY\[sdk=iphoneos\*\] = [^;]*;/CODE_SIGN_IDENTITY[sdk=iphoneos*] = '"$IOS_CODE_SIGN_IDENTITY"';/g' "$PBXPROJ" || true
          /usr/bin/perl -0777 -i -pe 's/CODE_SIGN_IDENTITY = [^;]*;/CODE_SIGN_IDENTITY = '"$IOS_CODE_SIGN_IDENTITY"';/g' "$PBXPROJ" || true

          echo "✅ Runner manual signing configured in pbxproj"

      - name: Create ExportOptions.plist
        shell: bash
        run: |
          set -euo pipefail
          cat > ios/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${IOS_EXPORT_METHOD}</string>
            <key>teamID</key>
            <string>${IOS_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${IOS_BUNDLE_ID}</key>
              <string>${PP_NAME}</string>
            </dict>
            <key>signingCertificate</key>
            <string>${IOS_CODE_SIGN_IDENTITY}</string>
            <key>compileBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          echo "✅ ExportOptions.plist created"
          cat ios/ExportOptions.plist

      - name: Build iOS Archive (show full error even if xcpretty fails)
        shell: bash
        run: |
          set -euo pipefail
          cd ios

          LOG="$RUNNER_TEMP/xcodebuild_archive.log"
          : > "$LOG"   # create/empty the file (so tail always works)

          echo "=== xcodebuild version ===" | tee -a "$LOG"
          xcodebuild -version | tee -a "$LOG"

          echo "=== Start Archive ===" | tee -a "$LOG"

          # Run xcodebuild, save ALL output to file
          set +e
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/Runner.xcarchive" \
            -destination 'generic/platform=iOS' \
            archive \
            DEVELOPMENT_TEAM="$IOS_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$IOS_CODE_SIGN_IDENTITY" \
            PROVISIONING_PROFILE_SPECIFIER="$PP_NAME" \
            2>&1 | tee -a "$LOG"
          RC=${PIPESTATUS[0]}
          set -e

          echo "xcodebuild exit code: $RC" | tee -a "$LOG"

          if [ "$RC" -ne 0 ]; then
            echo "❌ Archive failed. LAST 200 LINES:" 
            tail -n 200 "$LOG" || true

            echo "❌ Grep common errors:"
            grep -E "error:|Provisioning|Signing|No profiles|CodeSign|bundle identifier|entitlements" -n "$LOG" || true

            exit "$RC"
          fi

          echo "✅ Archive created"


      - name: Export IPA
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/ios/ipa

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Runner.xcarchive" \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ios/ExportOptions.plist

          echo "✅ IPA exported"
          ls -lh build/ios/ipa/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/*.ipa
          if-no-files-found: error

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Install fastlane
        shell: bash
        run: |
          set -euo pipefail
          gem install fastlane -N

      - name: Create ASC api_key.json
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .private
          echo "$ASC_KEY_P8_B64" | tr -d '\n\r ' | base64 --decode > .private/AuthKey.p8

          cat > .private/api_key.json <<EOF
          {
            "key_id": "${ASC_KEY_ID}",
            "issuer_id": "${ASC_ISSUER_ID}",
            "key_filepath": ".private/AuthKey.p8",
            "in_house": false
          }
          EOF

      - name: Upload to TestFlight
        shell: bash
        run: |
          set -euo pipefail

          IPA_PATH="$(ls -1 build/ios/ipa/*.ipa | head -n 1)"
          [ -f "$IPA_PATH" ] || { echo "❌ IPA not found"; exit 1; }

          echo "✅ Uploading to TestFlight: $IOS_BUNDLE_ID"
          fastlane pilot upload \
            --ipa "$IPA_PATH" \
            --api_key_path ".private/api_key.json" \
            --app_identifier "$IOS_BUNDLE_ID" \
            --skip_waiting_for_build_processing true

          echo "✅ Uploaded. Check App Store Connect → TestFlight."
