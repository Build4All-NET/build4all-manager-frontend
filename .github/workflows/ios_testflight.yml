name: iOS - Build IPA + Upload TestFlight (NO dart-define)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ios:
    runs-on: macos-14

    env:
      IOS_P12_B64: ${{ secrets.IOS_P12_B64 }}
      IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
      IOS_MOBILEPROVISION_B64: ${{ secrets.IOS_MOBILEPROVISION_B64 }}
      IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
      IOS_EXPORT_METHOD: ${{ secrets.IOS_EXPORT_METHOD }} # app-store
      IOS_CODE_SIGN_IDENTITY: ${{ secrets.IOS_CODE_SIGN_IDENTITY }} # Apple Distribution

      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_P8_B64: ${{ secrets.ASC_KEY_P8_B64 }}

      COCOAPODS_DISABLE_STATS: "true"
      FASTLANE_OPT_OUT_USAGE: "true"
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.0"
          channel: stable
          cache: true

      - name: Ensure iOS platform exists (generate ios/)
        run: |
          flutter clean
          flutter create --platforms=ios .
          flutter pub get

      - name: Set minimum iOS deployment target
        run: |
          # Set platform in Podfile to iOS 12.0 (minimum supported)
          if grep -q "# platform :ios" ios/Podfile; then
            sed -i '' "s/# platform :ios, '.*'/platform :ios, '12.0'/" ios/Podfile
          elif ! grep -q "platform :ios" ios/Podfile; then
            sed -i '' "1s/^/platform :ios, '12.0'\n/" ios/Podfile
          else
            sed -i '' "s/platform :ios, '.*'/platform :ios, '12.0'/" ios/Podfile
          fi
          
          # Update Xcode project deployment target
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 12.0;/g' ios/Runner.xcodeproj/project.pbxproj
          
          echo "✅ iOS deployment target set to 12.0"

      - name: Check Podfile exists
        run: |
          ls -la ios
          echo "--- Podfile content (first 20 lines) ---"
          cat ios/Podfile | head -20
          test -f ios/Podfile && echo "✅ Podfile found" || (echo "❌ Podfile missing" && exit 1)

      # ✅ Add required privacy strings to Info.plist
      - name: Add privacy strings to Info.plist
        shell: bash
        run: |
          set -euo pipefail
          
          INFO_PLIST="ios/Runner/Info.plist"
          
          if [ ! -f "$INFO_PLIST" ]; then
            echo "❌ Info.plist not found at $INFO_PLIST"
            exit 1
          fi
          
          echo "✅ Adding privacy usage descriptions to Info.plist..."
          
          # Add NSPhotoLibraryUsageDescription
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'This app needs access to your photo library to allow you to select and upload images.'" "$INFO_PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryUsageDescription 'This app needs access to your photo library to allow you to select and upload images.'" "$INFO_PLIST"
          
          # Add NSCameraUsageDescription
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'This app needs access to your camera to allow you to take and upload photos.'" "$INFO_PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :NSCameraUsageDescription 'This app needs access to your camera to allow you to take and upload photos.'" "$INFO_PLIST"
          
          # Add NSPhotoLibraryAddUsageDescription
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryAddUsageDescription string 'This app needs permission to save images to your photo library.'" "$INFO_PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryAddUsageDescription 'This app needs permission to save images to your photo library.'" "$INFO_PLIST"
          
          echo "✅ Privacy strings added successfully!"

      - name: Debug P12 decode
        shell: bash
        run: |
          set -euo pipefail
          echo "$IOS_P12_B64" | tr -d '\n\r ' | base64 --decode > "$RUNNER_TEMP/cert.p12"
          echo "Size:"
          ls -lh "$RUNNER_TEMP/cert.p12"
          echo "File type:"
          file "$RUNNER_TEMP/cert.p12" || true
          echo "Try open with openssl (validates password too):"
          openssl pkcs12 -in "$RUNNER_TEMP/cert.p12" -passin pass:"$IOS_P12_PASSWORD" -info -noout
          echo "✅ P12 valid + password OK"

      - name: Install signing cert + provisioning profile
        shell: bash
        run: |
          set -euo pipefail

          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PWD="ci_pwd_123"

          # Create and configure keychain
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -s "$KEYCHAIN_PATH"

          # Import certificate
          echo "$IOS_P12_B64" | tr -d '\n\r ' | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN_PATH" -P "$IOS_P12_PASSWORD" -A \
            -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/xcodebuild

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

          # Install provisioning profile
          PP_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP_DIR"
          
          # Decode and save provisioning profile to temp location first
          echo "$IOS_MOBILEPROVISION_B64" | tr -d '\n\r ' | base64 --decode > "$RUNNER_TEMP/profile.mobileprovision"
          
          # Verify the provisioning profile file exists and has content
          if [ ! -s "$RUNNER_TEMP/profile.mobileprovision" ]; then
            echo "❌ Provisioning profile is empty or missing"
            exit 1
          fi
          
          # Extract profile info to a temporary plist
          security cms -D -i "$RUNNER_TEMP/profile.mobileprovision" > "$RUNNER_TEMP/profile.plist"
          
          # Extract UUID from the plist
          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$RUNNER_TEMP/profile.plist")
          PP_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$RUNNER_TEMP/profile.plist")
          
          # Copy to the correct location with UUID as filename
          cp "$RUNNER_TEMP/profile.mobileprovision" "$PP_DIR/$PP_UUID.mobileprovision"
          
          # Store for later use
          echo "$PP_UUID" > "$RUNNER_TEMP/pp_uuid.txt"
          echo "$PP_NAME" > "$RUNNER_TEMP/pp_name.txt"

          echo "✅ Provisioning Profile UUID: $PP_UUID"
          echo "✅ Provisioning Profile Name: $PP_NAME"
          
          # Verify certificate was installed
          echo ""
          echo "Installed signing identities:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true
          
          echo "✅ Installed cert + profile"

      - name: Update ExportOptions.plist
        shell: bash
        run: |
          set -euo pipefail
          
          # Get bundle ID from Info.plist
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" ios/Runner/Info.plist)
          
          # Read stored provisioning profile info
          PP_NAME=$(cat "$RUNNER_TEMP/pp_name.txt")
          
          # Create ExportOptions.plist
          cat > ios/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>${IOS_EXPORT_METHOD}</string>
              <key>teamID</key>
              <string>${IOS_TEAM_ID}</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>${BUNDLE_ID}</key>
                  <string>${PP_NAME}</string>
              </dict>
              <key>signingCertificate</key>
              <string>${IOS_CODE_SIGN_IDENTITY}</string>
              <key>uploadSymbols</key>
              <true/>
              <key>compileBitcode</key>
              <false/>
          </dict>
          </plist>
          EOF
          
          echo "✅ Created ExportOptions.plist"
          echo "Bundle ID: $BUNDLE_ID"
          echo "Provisioning Profile Name: $PP_NAME"

      - name: Install CocoaPods
        run: |
          cd ios
          pod repo update
          pod install --repo-update
          cd ..

      # ✅ CRITICAL FIX: Remove all provisioning profiles from Pods
      - name: Strip provisioning profiles from Pods (fix archive error)
        shell: bash
        run: |
          set -euo pipefail
          
          PODS_PBXPROJ="ios/Pods/Pods.xcodeproj/project.pbxproj"
          
          if [ ! -f "$PODS_PBXPROJ" ]; then
            echo "❌ Pods project.pbxproj not found"
            exit 1
          fi
          
          echo "🔧 Removing provisioning profiles from all Pod targets..."
          
          # Remove all provisioning profile settings from Pods
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = .*;/PROVISIONING_PROFILE_SPECIFIER = "";/g' "$PODS_PBXPROJ"
          sed -i '' 's/PROVISIONING_PROFILE = .*;/PROVISIONING_PROFILE = "";/g' "$PODS_PBXPROJ"
          sed -i '' 's/DEVELOPMENT_TEAM = [A-Z0-9]*;/DEVELOPMENT_TEAM = "";/g' "$PODS_PBXPROJ"
          sed -i '' 's/CODE_SIGN_IDENTITY = ".*";/CODE_SIGN_IDENTITY = "";/g' "$PODS_PBXPROJ"
          sed -i '' 's/CODE_SIGN_STYLE = Manual;/CODE_SIGN_STYLE = Automatic;/g' "$PODS_PBXPROJ"
          
          # Disable code signing for Pods
          sed -i '' 's/CODE_SIGNING_ALLOWED = YES;/CODE_SIGNING_ALLOWED = NO;/g' "$PODS_PBXPROJ"
          sed -i '' 's/CODE_SIGNING_REQUIRED = YES;/CODE_SIGNING_REQUIRED = NO;/g' "$PODS_PBXPROJ"
          
          echo "✅ Pods configured to skip code signing"

      - name: Configure Runner target for manual signing
        shell: bash
        run: |
          set -euo pipefail
          
          gem install xcodeproj -N
          
          PP_NAME=$(cat "$RUNNER_TEMP/pp_name.txt")
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" ios/Runner/Info.plist)
          
          # Create Ruby script to update Runner target only
          cat > /tmp/configure_signing.rb <<'RUBY'
          require 'xcodeproj'
          
          project_path = 'ios/Runner.xcodeproj'
          project = Xcodeproj::Project.open(project_path)
          
          runner_target = project.targets.find { |t| t.name == 'Runner' }
          
          if runner_target.nil?
            puts "❌ Runner target not found"
            exit 1
          end
          
          pp_name = ENV['PP_NAME']
          team_id = ENV['IOS_TEAM_ID']
          bundle_id = ENV['BUNDLE_ID']
          sign_identity = ENV['IOS_CODE_SIGN_IDENTITY']
          
          runner_target.build_configurations.each do |config|
            config.build_settings['DEVELOPMENT_TEAM'] = team_id
            config.build_settings['CODE_SIGN_STYLE'] = 'Manual'
            config.build_settings['CODE_SIGN_IDENTITY'] = sign_identity
            config.build_settings['CODE_SIGN_IDENTITY[sdk=iphoneos*]'] = sign_identity
            config.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = pp_name
            config.build_settings['PROVISIONING_PROFILE_SPECIFIER[sdk=iphoneos*]'] = pp_name
            config.build_settings['PRODUCT_BUNDLE_IDENTIFIER'] = bundle_id
            config.build_settings['CODE_SIGNING_ALLOWED'] = 'YES'
            config.build_settings['CODE_SIGNING_REQUIRED'] = 'YES'
          end
          
          project.save
          puts "✅ Configured Runner target for manual signing"
          puts "   Bundle ID: #{bundle_id}"
          puts "   Team ID: #{team_id}"
          puts "   Profile: #{pp_name}"
          puts "   Sign Identity: #{sign_identity}"
          RUBY
          
          # Run the Ruby script
          PP_NAME="$PP_NAME" \
          IOS_TEAM_ID="$IOS_TEAM_ID" \
          BUNDLE_ID="$BUNDLE_ID" \
          IOS_CODE_SIGN_IDENTITY="$IOS_CODE_SIGN_IDENTITY" \
          ruby /tmp/configure_signing.rb

      - name: Build iOS Archive
        shell: bash
        run: |
          set -euo pipefail
          
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PWD="ci_pwd_123"
          
          # Unlock keychain before building
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          
          # Build the archive
          cd ios
          
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/Runner.xcarchive" \
            -destination 'generic/platform=iOS' \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
            archive
          
          echo "✅ Archive created at $RUNNER_TEMP/Runner.xcarchive"

      - name: Export IPA
        shell: bash
        run: |
          set -euo pipefail
          
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PWD="ci_pwd_123"
          
          # Unlock keychain before exporting
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          
          mkdir -p build/ios/ipa
          
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Runner.xcarchive" \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ios/ExportOptions.plist \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
            -allowProvisioningUpdates
          
          echo "✅ IPA exported"
          ls -lh build/ios/ipa/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/*.ipa
          if-no-files-found: error

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Install fastlane
        run: gem install fastlane -N

      - name: Create ASC api_key.json
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .private
          
          # Decode the P8 key
          echo "$ASC_KEY_P8_B64" | tr -d '\n\r ' | base64 --decode > .private/AuthKey_${ASC_KEY_ID}.p8
          
          # Verify the key is valid
          openssl pkey -in .private/AuthKey_${ASC_KEY_ID}.p8 -noout
          echo "✅ ASC P8 key is valid"
          
          # Read the key content
          KEY_CONTENT=$(cat .private/AuthKey_${ASC_KEY_ID}.p8)
          
          # Create api_key.json with the key content embedded
          cat > .private/api_key.json <<EOF
          {
            "key_id": "${ASC_KEY_ID}",
            "issuer_id": "${ASC_ISSUER_ID}",
            "key": $(echo "$KEY_CONTENT" | python3 -c 'import json, sys; print(json.dumps(sys.stdin.read()))'),
            "in_house": false
          }
          EOF
          
          echo "✅ Created api_key.json"

      - name: Upload to TestFlight
        shell: bash
        run: |
          set -euo pipefail

          IPA_PATH="$(ls -1 build/ios/ipa/*.ipa | head -n 1)"
          [ -f "$IPA_PATH" ] || { echo "❌ IPA not found"; exit 1; }

          # Extract bundle ID from the IPA
          TMP_DIR="$(mktemp -d)"
          unzip -q "$IPA_PATH" -d "$TMP_DIR"
          APP_PATH="$(find "$TMP_DIR/Payload" -maxdepth 1 -type d -name "*.app" | head -n 1)"
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP_PATH/Info.plist")

          echo "✅ Uploading IPA to TestFlight"
          echo "   Bundle ID: $BUNDLE_ID"
          echo "   IPA: $IPA_PATH"
          
          fastlane pilot upload \
            --ipa "$IPA_PATH" \
            --api_key_path ".private/api_key.json" \
            --app_identifier "$BUNDLE_ID" \
            --skip_waiting_for_build_processing true

          echo ""
          echo "✅ Upload complete! Build will appear in TestFlight in 15-60 minutes."
          echo "   Check App Store Connect: https://appstoreconnect.apple.com"
