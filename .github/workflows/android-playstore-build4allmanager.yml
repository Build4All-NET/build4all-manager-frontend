name: Build4All Manager (Android) - Upload to Google Play

on:
  workflow_dispatch:
    inputs:
      track:
        description: "Track: internal | alpha | beta | production"
        required: true
        default: "internal"
      release_status:
        description: "draft | inProgress | completed"
        required: true
        default: "draft"

      changelog:
        description: "Release notes"
        required: false
        default: "CI build"
  push:
    branches: [ "main" ]
    paths:
      - "lib/**"
      - "android/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - ".github/workflows/android-playstore-build4allmanager.yml"

permissions:
  contents: read

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    env:
      PACKAGE_NAME: "com.build4all.build4allmanager"

      PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}

      ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      # --------------------------------------------------
      # Checkout
      # --------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------------------------------
      # Java + Flutter
      # --------------------------------------------------
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.0"
          channel: stable
          cache: true

      # --------------------------------------------------
      # Android SDK — accept licences & pre-install
      # platforms so Gradle never attempts a mid-build
      # download (which fails with corrupt ZIP errors)
      # --------------------------------------------------
      - name: Accept Android SDK licenses
        shell: bash
        run: |
          set -euo pipefail
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses || true

      - name: Pre-install Android SDK platforms & build-tools
        shell: bash
        run: |
          set -euo pipefail
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"

          echo "📦 Installing Android SDK components..."

          "$SDKMANAGER" --install \
            "platforms;android-23" \
            "platforms;android-33" \
            "platforms;android-34" \
            "build-tools;33.0.2" \
            "build-tools;34.0.0"

          echo "✅ SDK components installed"

      # --------------------------------------------------
      # Flutter deps
      # --------------------------------------------------
      - name: Flutter pub get
        run: flutter pub get

      # --------------------------------------------------
      # Setup Android local.properties (FIX)
      # --------------------------------------------------
      - name: Setup Android local.properties
        shell: bash
        run: |
          set -euo pipefail
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          flutter config --android-sdk "$ANDROID_SDK_ROOT"
          echo "✅ local.properties configured"

      # --------------------------------------------------
      # Clean Gradle cache
      # --------------------------------------------------
     # - name: Clean Gradle cache
      #  shell: bash
      #  run: |
       #   set -euo pipefail
        #  cd android
         # rm -rf .gradle build
          #cd ..
          #flutter clean
          #echo "✅ Gradle cache cleaned"

      # --------------------------------------------------
      # Android signing (NO heredoc, NO syntax traps)
      # --------------------------------------------------
      - name: Prepare Android signing
        shell: bash
        run: |
          set -euo pipefail

          echo "🔐 Preparing Android upload keystore"

          echo "${ANDROID_KEYSTORE_B64}" | tr -d '\n\r ' | base64 --decode > android/upload-keystore.jks

          printf "storeFile=upload-keystore.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n" \
            "${ANDROID_KEYSTORE_PASSWORD}" \
            "${ANDROID_KEY_ALIAS}" \
            "${ANDROID_KEY_PASSWORD}" \
            > android/key.properties

          echo "✅ android/key.properties created"

      # --------------------------------------------------
      # Compute version
      # --------------------------------------------------
      - name: Compute build name & number
        shell: bash
        run: |
          set -euo pipefail

          BUILD_NAME="$(python3 - <<'PY'
          import re
          t=open("pubspec.yaml").read()
          m=re.search(r"^version:\s*([0-9]+(?:\.[0-9]+){1,3})", t, re.M)
          print(m.group(1) if m else "1.0.0")
          PY
          )"
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"

          echo "BUILD_NAME=$BUILD_NAME" >> $GITHUB_ENV
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV

          echo "✅ BUILD_NAME=$BUILD_NAME"
          echo "✅ BUILD_NUMBER=$BUILD_NUMBER"

      # --------------------------------------------------
      # Build AAB
      # --------------------------------------------------
      - name: Build Android App Bundle (AAB)
        shell: bash
        run: |
          set -euo pipefail
          flutter build appbundle --release \
            --build-name "$BUILD_NAME" \
            --build-number "$BUILD_NUMBER"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: build/app/outputs/bundle/release/*.aab
          if-no-files-found: error

      # --------------------------------------------------
      # Release notes
      # --------------------------------------------------
      - name: Prepare Play Store release notes
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CHANGELOG="${{ github.event.inputs.changelog }}"
          else
            CHANGELOG="CI build (push)"
          fi

          mkdir -p distribution/whatsnew
          echo "$CHANGELOG" > distribution/whatsnew/whatsnew-en-US

          echo "✅ Release notes:"
          cat distribution/whatsnew/whatsnew-en-US

      # --------------------------------------------------
      # Write service account json
      # --------------------------------------------------
      - name: Write Play service account json
        shell: bash
        run: |
          set -euo pipefail
      
          if [ -z "${PLAY_SERVICE_ACCOUNT_JSON:-}" ]; then
            echo "❌ PLAY_SERVICE_ACCOUNT_JSON secret is empty"
            exit 1
          fi
      
          printf '%s' "$PLAY_SERVICE_ACCOUNT_JSON" > service-account.json
      
          echo "✅ service-account.json written"
          echo "📏 File size:"
          wc -c service-account.json
      
          python3 -m json.tool service-account.json > /dev/null
          echo "✅ service-account.json is valid JSON"
      
      - name: Debug service account metadata
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          with open("service-account.json", "r", encoding="utf-8") as f:
              j = json.load(f)
          print("client_email exists:", "client_email" in j)
          print("project_id exists:", "project_id" in j)
          print("type:", j.get("type"))
          PY
      # --------------------------------------------------
      # Upload to Google Play
      # --------------------------------------------------
      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: service-account.json
          packageName: ${{ env.PACKAGE_NAME }}
          releaseFiles: build/app/outputs/bundle/release/*.aab
          track: ${{ github.event.inputs.track || 'internal' }}
          status: ${{ github.event.inputs.release_status || 'draft' }}
          whatsNewDirectory: distribution/whatsnew
