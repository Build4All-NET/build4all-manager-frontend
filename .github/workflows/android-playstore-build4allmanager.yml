name: Build4All Manager (Android) - Upload to Google Play

on:
  workflow_dispatch:
    inputs:
      track:
        description: "Track: internal | alpha | beta | production"
        required: true
        default: "internal"
      changelog:
        description: "Release notes (optional)"
        required: false
        default: "CI build"
  push:
    branches: [ "main" ]
    paths:
      - "lib/**"
      - "android/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - ".github/workflows/android-playstore-build4allmanager.yml"

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest

    env:
      PACKAGE_NAME: "com.build4all.build4allmanager"
      PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.0"
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      # ---- Signing (upload keystore) ----
      - name: Decode Android keystore
        if: ${{ secrets.ANDROID_KEYSTORE_B64 != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > android/upload-keystore.jks

      - name: Create key.properties
        if: ${{ secrets.ANDROID_KEYSTORE_B64 != '' }}
        run: |
          cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          EOF

      - name: Build AAB (release)
        run: flutter build appbundle --release

      - name: Write service account json
        run: |
          echo "$PLAY_SERVICE_ACCOUNT_JSON" > service-account.json

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: service-account.json
          packageName: ${{ env.PACKAGE_NAME }}
          releaseFiles: build/app/outputs/bundle/release/*.aab
          track: ${{ github.event.inputs.track || 'internal' }}
          status: completed
