name: Build4All Manager (Android) - Upload to Google Play

on:
  workflow_dispatch:
    inputs:
      track:
        description: "Track: internal | alpha | beta | production"
        required: true
        default: "internal"
      release_status:
        description: "Release status: completed | draft | inProgress"
        required: true
        default: "completed"
      changelog:
        description: "Release notes (What’s new)"
        required: false
        default: "CI build"
  push:
    branches: [ "main" ]
    paths:
      - "lib/**"
      - "android/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - ".github/workflows/android-playstore-build4allmanager.yml"

permissions:
  contents: read

concurrency:
  group: android-playstore-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    env:
      PACKAGE_NAME: "com.build4all.build4allmanager"
      PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}

      # Optional signing secrets (recommended)
      ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java (Android)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.0"
          channel: stable
          cache: true

      - name: Flutter pub get
        shell: bash
        run: |
          set -euo pipefail
          flutter --version
          flutter pub get

      # ----------------------------
      # Android Signing (Upload Key)
      # ----------------------------
      - name: Decode Android keystore (if provided)
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "${ANDROID_KEYSTORE_B64:-}" ]; then
            echo "$ANDROID_KEYSTORE_B64" | tr -d '\n\r ' | base64 --decode > android/upload-keystore.jks
            echo "✅ Keystore written to android/upload-keystore.jks"
          else
            echo "⚠️ ANDROID_KEYSTORE_B64 is empty. If your release build requires signing, upload will fail."
          fi

      - name: Create android/key.properties
        shell: bash
        run: |
          set -euo pipefail
      
          # Create keystore file from secret
          echo "${ANDROID_KEYSTORE_B64}" | tr -d '\n\r ' | base64 --decode > android/upload-keystore.jks
      
          # Create key.properties (EOF must not be indented)
          cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          keyPassword=${ANDROID_KEY_PASSWORD}
          EOF
          
              echo "✅ android/key.properties created"


      # ----------------------------
      # Compute build name/number
      # ----------------------------
      - name: Compute build name/number
        shell: bash
        run: |
          set -euo pipefail

          BUILD_NAME="$(python3 - <<'PY'
          import re
          t=open("pubspec.yaml","r",encoding="utf-8").read()
          m=re.search(r"^version:\s*([0-9]+(?:\.[0-9]+){1,3})", t, re.M)
          print(m.group(1) if m else "1.0.0")
          PY
          )"
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"

          echo "BUILD_NAME=$BUILD_NAME" >> $GITHUB_ENV
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
          echo "✅ Using BUILD_NAME=$BUILD_NAME BUILD_NUMBER=$BUILD_NUMBER"

      # ----------------------------
      # Build AAB
      # ----------------------------
      - name: Build Android App Bundle (AAB)
        shell: bash
        run: |
          set -euo pipefail
          flutter build appbundle --release \
            --build-name "$BUILD_NAME" \
            --build-number "$BUILD_NUMBER"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: build/app/outputs/bundle/release/*.aab
          if-no-files-found: error

      # ----------------------------
      # Prepare release notes
      # (r0adkll action can read "whatsNewDirectory")
      # ----------------------------
      - name: Prepare release notes (whatsnew)
        shell: bash
        run: |
          set -euo pipefail

          # Determine changelog
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CHANGELOG="${{ github.event.inputs.changelog }}"
          else
            CHANGELOG="CI build (push)"
          fi
          [ -n "${CHANGELOG:-}" ] || CHANGELOG="CI build"

          mkdir -p distribution/whatsnew
          # Google Play expects locale files like whatsnew-en-US
          echo "$CHANGELOG" > distribution/whatsnew/whatsnew-en-US

          echo "✅ Release notes prepared:"
          cat distribution/whatsnew/whatsnew-en-US

      # ----------------------------
      # Write service account json
      # ----------------------------
      - name: Write service account json
        shell: bash
        run: |
          set -euo pipefail
          [ -n "${PLAY_SERVICE_ACCOUNT_JSON:-}" ] || { echo "❌ Missing PLAY_SERVICE_ACCOUNT_JSON secret"; exit 1; }
          echo '${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}' > service-account.json

      # Optional safe debug (does NOT print private key)
      - name: Debug service account (safe)
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          j=json.load(open("service-account.json"))
          print("client_email:", j.get("client_email"))
          print("project_id:", j.get("project_id"))
          PY

      # ----------------------------
      # Upload to Google Play
      # ----------------------------
      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: service-account.json
          packageName: ${{ env.PACKAGE_NAME }}
          releaseFiles: build/app/outputs/bundle/release/*.aab
          track: ${{ github.event.inputs.track || 'internal' }}
          status: ${{ github.event.inputs.release_status || 'completed' }}
          whatsNewDirectory: distribution/whatsnew
