name: Sprint release to production

on:
  workflow_dispatch:        # triggered manually by the team
    inputs:
      sprint_name:
        description: 'Sprint name (e.g. sprint-24)'
        required: true

jobs:
  open-prod-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout UAT main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify PROD_DEPLOY_TOKEN
        env:
          GH_TOKEN: ${{ secrets.PROD_DEPLOY_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "::error::PROD_DEPLOY_TOKEN secret is empty or not set on this repo."
            exit 1
          fi
          echo "Token length: ${#GH_TOKEN}"

          who=$(curl -sS -H "Authorization: Bearer ${GH_TOKEN}" \
                https://api.github.com/user | jq -r '.login // empty')
          if [ -z "${who}" ]; then
            echo "::error::Token authentication failed (no user returned)."
            exit 1
          fi
          echo "Authenticated as: ${who}"

          perms=$(curl -sS -H "Authorization: Bearer ${GH_TOKEN}" \
                  https://api.github.com/repos/Build4All-NET/build4all-manager-frontend-prod)
          push=$(echo "${perms}" | jq -r '.permissions.push // false')
          if [ "${push}" != "true" ]; then
            echo "::error::Token has no push access to build4all-manager-frontend-prod."
            echo "${perms}" | jq '{name, permissions, message}'
            exit 1
          fi
          echo "Token has push access to build4all-manager-frontend-prod."

      - name: Push to prod repo and open PR
        env:
          GH_TOKEN: ${{ secrets.PROD_DEPLOY_TOKEN }}
          SPRINT: ${{ github.event.inputs.sprint_name }}
        run: |
          set -euo pipefail

          # Wipe any inherited auth state from previous steps / runner setup
          git config --local --unset-all http.https://github.com/.extraheader || true
          git config --local --unset-all credential.helper || true
          git config --global --unset-all credential.helper || true

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          PROD_URL="https://github.com/Build4All-NET/build4all-manager-frontend-prod.git"

          # GitHub's git endpoint requires Basic auth (Bearer is REST-API only).
          BASIC=$(printf 'x-access-token:%s' "${GH_TOKEN}" | base64 -w0)
          AUTH_HEADER="AUTHORIZATION: basic ${BASIC}"

          # Fetch prod main with explicit auth header (tolerate empty prod on first run)
          git -c http.extraheader="${AUTH_HEADER}" fetch "${PROD_URL}" main:refs/remotes/prod/main \
            || echo "prod/main not found - first run"

          # Files that must keep their PROD version (never overwritten by UAT)
          PROTECTED_FILES=(
            "android/app/google-services.json"
            "ios/Runner/GoogleService-Info.plist"
            "android/app/build.gradle"
            "ios/Runner/Info.plist"
            "ios/Runner.xcodeproj/project.pbxproj"
            "lib/config/hostIp.json"
          )

          for f in "${PROTECTED_FILES[@]}"; do
            if git cat-file -e prod/main:"$f" 2>/dev/null; then
              git checkout prod/main -- "$f"
              echo "Kept prod version of: $f"
            else
              echo "Skipping (not in prod yet): $f"
            fi
          done

          # Commit the restored files if anything actually changed
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore: preserve prod-specific files for ${SPRINT}"
          fi

          # Push directly to the prod URL with the auth header injected on the command line.
          # This bypasses any remote-URL credentials and any leftover extraheader.
          git -c http.extraheader="${AUTH_HEADER}" push "${PROD_URL}" \
              HEAD:refs/heads/${SPRINT} --force

          # Open the PR on the prod repo (gh uses GH_TOKEN automatically)
          gh pr create \
            --repo Build4All-NET/build4all-manager-frontend-prod \
            --head ${SPRINT} \
            --base main \
            --title "Release: ${SPRINT}" \
            --body "Merging UAT main into production for ${SPRINT}. Protected files (firebase configs, bundle ids, hostIp) are kept from prod. Please review and approve."
