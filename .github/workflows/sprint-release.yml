name: Sprint release to production

on:
  workflow_dispatch:        # triggered manually by the team
    inputs:
      sprint_name:
        description: 'Sprint name (e.g. sprint-24)'
        required: true

jobs:
  open-prod-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout UAT main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to prod repo and open PR
        env:
          GH_TOKEN: ${{ secrets.PROD_DEPLOY_TOKEN }}
          SPRINT: ${{ github.event.inputs.sprint_name }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # Add prod repo as a remote and fetch its main (tolerate empty prod on first run)
          git remote add prod https://x-access-token:${GH_TOKEN}@github.com/Build4All-NET/build4all-manager-frontend-prod.git
          git fetch prod main || echo "prod/main not found - first run"

          # Files that must keep their PROD version (never overwritten by UAT)
          PROTECTED_FILES=(
            "android/app/google-services.json"
            "ios/Runner/GoogleService-Info.plist"
            "android/app/build.gradle"
            "ios/Runner/Info.plist"
            "ios/Runner.xcodeproj/project.pbxproj"
            "lib/config/hostIp.json"
          )

          for f in "${PROTECTED_FILES[@]}"; do
            if git cat-file -e prod/main:"$f" 2>/dev/null; then
              git checkout prod/main -- "$f"
              echo "Kept prod version of: $f"
            else
              echo "Skipping (not in prod yet): $f"
            fi
          done

          # Commit the restored files if anything actually changed
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore: preserve prod-specific files for ${SPRINT}"
          fi

          # Push to a sprint branch on the prod repo
          git push prod HEAD:refs/heads/${SPRINT} --force

          # Open the PR on the prod repo
          gh pr create \
            --repo Build4All-NET/build4all-manager-frontend-prod \
            --head ${SPRINT} \
            --base main \
            --title "Release: ${SPRINT}" \
            --body "Merging UAT main into production for ${SPRINT}. Protected files (firebase configs, bundle ids, hostIp) are kept from prod. Please review and approve."
